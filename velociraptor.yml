- module: velociraptor
  velociraptor_logs:
    enabled: true
    var.paths:
      - /opt/velociraptor/logs/*_*.log.*

  velociraptor_server_artifacts:
    enabled: true
    var.paths:
      - /opt/velociraptor/server_artifacts/Server.Audit.Logs/*.json
      - /opt/velociraptor/server_artifacts/Server.Internal.ArtifactModification/*.json
      - /opt/velociraptor/server_artifacts/Server.Hunt.Creation/*.json

  velociraptor_server_artifacts_logs:
    enabled: true
    var.paths:
      - /opt/velociraptor/server_artifact_logs/AWX.Flows.Upload/*.json
